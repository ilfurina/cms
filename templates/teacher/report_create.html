{% extends 'teacher/course_edit.html' %}
{% block option %}

    <div class="d-flex justify-content-between mb-4">
        <div class="btn-group" role="group">
            <a href="{% url 'teacher:reports' current_course.course_id %}"
               class="btn {% if request.resolver_match.url_name == 'reports' %}btn-primary{% else %}btn-outline-primary{% endif %}">
                进行中的任务
            </a>
            <a href="{% url 'teacher:create_report' current_course.course_id %}"
               class="btn {% if request.resolver_match.url_name == 'create_report' %}btn-primary{% else %}btn-outline-primary{% endif %}">
                发布新任务
            </a>
        </div>
        <div>
            <span class="badge bg-info">总任务数：{{ assignments|length }}</span>
        </div>
    </div>

    <div class="border rounded p-3">
        <h6>新建实验报告任务</h6>
        <form method="post" enctype="multipart/form-data" action="{% url 'teacher:create_report' current_course.course_id %}">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">任务标题</label>
                <input type="text" name="title" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">任务描述</label>
                <textarea name="description" class="form-control" rows="3" required></textarea>
            </div>
            <div class="mb-3">
                <label class="form-label">附件文件</label>
                <input type="file" name="attachment" class="form-control">
            </div>
            <div class="mb-3">
                <label class="form-label">截止时间</label>
                <input type="datetime-local" name="deadline" class="form-control" required>
            </div>
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">发布任务</button>
                <a href="{% url 'teacher:reports' current_course.course_id %}"
                   class="btn btn-secondary">取消</a>
            </div>
        </form>
    </div>
{% endblock %}
