{% extends "base.html" %}

{% block content %}
<div class="container">
    <h2>我的习题库</h2>
    <a href="{% url 'teacher:create_question_bank' %}" class="btn btn-primary mb-3">新建习题库</a>
    
    <div class="list-group">
        {% for bank in object_list %}
        <a href="{% url 'teacher:question_bank_detail' bank.pk %}" class="list-group-item">
            {{ bank.name }} ({{ bank.questions.count }}题)
        </a>
        {% endfor %}
    </div>
</div>
{% endblock %}
