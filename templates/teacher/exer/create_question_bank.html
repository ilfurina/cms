<!-- templates/teacher/create_question_bank.html -->
{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <h2>新建习题库</h2>
    <form method="post">
        {% csrf_token %}
        <div class="form-group">
            <label for="id_name">题库名称</label>
            {{ form.name }}
            <small class="form-text text-muted">例如：Python编程基础题库</small>
        </div>
        <button type="submit" class="btn btn-primary">创建题库</button>
        <a href="{% url 'teacher:question_bank_list' %}" class="btn btn-secondary">取消</a>
    </form>
</div>
{% endblock %}
