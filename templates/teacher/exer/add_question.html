<div class="form-group">
    <label>题目类型</label>
    <select class="form-control" id="questionType" name="question_type">
        {% for code, name in question_types %}
            <option value="{{ code }}" {% if code == selected_type %}selected{% endif %}>
                {{ name }}
            </option>
        {% endfor %}
    </select>
</div>

<!-- 动态表单区域 -->
<div id="formContainer">
    {% include 'teacher/exer/_question_form.html' with form=form %}
</div>

<script>
    // 动态切换表单类型
    document.getElementById('questionType').addEventListener('change', function () {
        const type = this.value;
        fetch(`?type=${type}`)
            .then(response => response.text())
            .then(html => {
                document.getElementById('formContainer').innerHTML = html;
            });
    });
</script>
